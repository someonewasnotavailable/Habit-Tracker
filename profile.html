<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./images/icons8-profile-32.png">
    <link rel="shortcut icon" href="./images/icons8-profile-32.png">
</head>
<body>
    <section class="profilePage">
        <a href="./index.html" class="backLink">← Back</a>
        <div class="profileCard">
            <div class="profileAvatarWrap">
                <img src="./images/icons8-profile-32.png" alt="profile picture">
            </div>
            <div class="profileInfo">
                <p class="profileName">User</p>
                <p class="profileXp">0000 xp</p>
            </div>
        </div>
        <div class="profileDetails">
            <div class="profileDetailBox">
                <p class="detailLabel">Current Streak</p>
                <p class="detailValue">0 days</p>
            </div>
            <div class="profileDetailBox">
                <p class="detailLabel">Longest Streak</p>
                <p class="detailValue">0 days</p>
            </div>
            <div class="profileDetailBox">
                <p class="detailLabel">Habits Completed</p>
                <p class="detailValue">0 / 0</p>
            </div>
            <div class="profileDetailBox profileProgressBox">
                <div class="profileProgressHeader">
                    <p class="detailLabel">Completion Progress</p>
                    <p class="profileProgressValue">0%</p>
                </div>
                <div class="progressTrack" aria-hidden="true">
                    <div class="progressFill"></div>
                </div>
                <p class="profileProgressCaption">0 of 0 habits completed</p>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
